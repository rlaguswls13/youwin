server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: youwin
  datasource:
    url: jdbc:mysql://localhost:3306/youwin?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: youwin
    password: youwin
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
mybatis:
  mapper-locations: classpath:repository/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
