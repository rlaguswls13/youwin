server:
  port: ${SERVER_PORT:8080}
spring:
  application:
    name: youwin
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/youwin?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:youwin}
    password: ${DB_PASSWORD:youwin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.youwin.mapper.dto
  configuration:
    map-underscore-to-camel-case: true